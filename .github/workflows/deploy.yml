name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-west-1
  TF_WORKING_DIR: infrastructure/environments/prod

jobs:
  deploy-backend:
    name: Deploy Infrastructure & Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build ingestion Lambda zip
        run: |
          pip install requests -t backend/ingestion_lambda/
          cd backend/ingestion_lambda
          zip -r lambda.zip ingestion.py utils.py requests/ urllib3/ certifi/ charset_normalizer/ idna/

      - name: Build retrieval Lambda zip
        run: |
          cd backend/retrieval_lambda
          zip lambda.zip retrieval.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_massive_api_key: ${{ secrets.MASSIVE_API_KEY }}
          TF_VAR_frontend_bucket_name: ${{ secrets.FRONTEND_BUCKET_NAME }}

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ secrets.FRONTEND_BUCKET_NAME }} --delete
